<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIL PORTFOLIO | REBEL</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P33S1B2ZJ1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P33S1B2ZJ1');
    </script>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23050505%22/><text y=%22.9em%22 font-size=%2290%22 fill=%22%23dfff00%22 font-family=%22serif%22 font-weight=%22bold%22>N</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap');

        :root {
            --bg: #050505;
            --accent: #dfff00;
            --text: #ffffff;
        }

        /* Убираем скроллбар */
        ::-webkit-scrollbar { display: none; }
        
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            /* Скрываем контент до загрузки скриптов, чтобы не было дерганий */
            opacity: 0; 
            transition: opacity 0.5s ease;
        }

        #cursor {
            position: fixed;
            width: 20px; height: 20px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            display: none;
        }

        @media (pointer: fine) {
            #cursor { display: block; }
            * { cursor: none; }
        }

        .hero {
            height: 250vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            font-size: clamp(8px, 2vw, 12px);
            letter-spacing: 2px;
            position: fixed;
            top: 20px;
            padding: 0 20px;
            z-index: 100;
        }

        .main-title {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(40px, 18vw, 250px);
            line-height: 0.8;
            text-align: center;
            text-transform: uppercase;
            white-space: nowrap;
            will-change: transform, opacity;
        }

        .sub-text {
            position: absolute;
            bottom: 5vh;
            right: 5vw;
            width: clamp(200px, 40vw, 350px);
            font-family: 'Space Mono', monospace;
            font-size: clamp(10px, 1.5vw, 14px);
            color: #888;
            text-align: right;
            line-height: 1.4;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.07;
            pointer-events: none;
            z-index: 10;
        }

        .scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            opacity: 0.4;
            letter-spacing: 3px;
        }

        .line { display: block; overflow: hidden; }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="noise"></div>

    <nav class="header">
        <div>Available 2026</div>
        <div>Non-conformist Dev</div>
    </nav>

    <div class="hero">
        <h1 class="main-title">
            <span class="line">CREATIVE</span>
            <span class="line" style="color: transparent; -webkit-text-stroke: 1px var(--text);">NIL</span>
        </h1>

        <div class="sub-text">
            МЫ СОЗДАЕМ ЦИФРОВОЙ ХАОС,<br>КОТОРЫЙ ВЫГЛЯДИТ КАК ИСКУССТВО.
        </div>

        <div class="scroll-hint">ПРОСКРОЛЬТЕ ВНИЗ</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Запуск после полной загрузки страницы
        window.addEventListener('load', () => {
            // Проявляем body
            document.body.style.opacity = "1";
            
            const cursor = document.getElementById('cursor');
            const isMobile = window.innerWidth < 768;

            // 1. Проверяем GSAP
            if (typeof gsap !== 'undefined') {
                gsap.registerPlugin(ScrollTrigger);

                // Входная анимация
                gsap.from(".line", {
                    y: "100%",
                    skewY: 7,
                    duration: 1.5,
                    stagger: 0.2,
                    ease: "expo.out"
                });

                // Скролл-анимация (Тут мы убрали тяжелый Blur для мобилок)
                gsap.to(".main-title", {
                    scrollTrigger: {
                        trigger: ".hero",
                        start: "top top",
                        end: "bottom center",
                        scrub: isMobile ? 0.5 : 1.5,
                    },
                    scale: isMobile ? 0.8 : 0.4,
                    opacity: 0,
                    y: isMobile ? -50 : -100,
                    filter: isMobile ? "none" : "blur(20px)",
                    letterSpacing: "-0.05em"
                });

                // Исчезновение подзаголовка
                gsap.to(".sub-text", {
                    scrollTrigger: {
                        trigger: ".hero",
                        start: "top top",
                        end: "20% top",
                        scrub: true
                    },
                    opacity: 0,
                    x: 50
                });

                // Курсор (только для ПК)
                if (!isMobile) {
                    document.addEventListener('mousemove', (e) => {
                        gsap.to(cursor, {
                            x: e.clientX,
                            y: e.clientY,
                            duration: 0.3,
                            ease: "power2.out"
                        });
                    });

                    // Эффект наведения на текст
                    document.querySelectorAll('.line').forEach(el => {
                        el.addEventListener('mouseenter', () => gsap.to(cursor, {scale: 6}));
                        el.addEventListener('mouseleave', () => gsap.to(cursor, {scale: 1}));
                    });
                }
            }
        });

        // Рефреш при изменении размера экрана
        window.addEventListener('resize', () => {
            ScrollTrigger.refresh();
        });
    </script>
</body>
</html>
